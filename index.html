
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', serif; background: #0a0f1e; color: #e8ddd0; min-height: 100vh; }

  #app { display: flex; flex-direction: column; height: 100vh; min-height: 600px; }

  /* Header */
  #header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; border-bottom: 0.5px solid rgba(255,200,150,0.2);
    background: rgba(10,15,30,0.95);
  }
  #header h1 { font-size: 18px; font-weight: 400; color: #f0c88a; letter-spacing: 2px; }
  #header .stats { font-size: 12px; color: rgba(240,200,138,0.6); letter-spacing: 1px; }

  /* Map container */
  #map-wrap { flex: 1; position: relative; overflow: hidden; cursor: grab; background: #0d1525; }
  #map-wrap.grabbing { cursor: grabbing; }
  #map-svg { position: absolute; top: 0; left: 0; }

  /* Toolbar */
  #toolbar {
    position: absolute; top: 16px; right: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 10;
  }
  .tool-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(20,28,50,0.9); border: 0.5px solid rgba(255,200,150,0.3);
    color: #f0c88a; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .tool-btn:hover { background: rgba(240,200,138,0.15); border-color: rgba(255,200,150,0.7); }

  /* Pin marker */
  .pin { cursor: pointer; }
  .pin circle { transition: r 0.2s; }
  .pin:hover circle { r: 10; }
  .pin-pulse { animation: pulse 2s infinite; }
  @keyframes pulse {
    0% { opacity: 0.8; r: 6; }
    50% { opacity: 0.3; r: 12; }
    100% { opacity: 0.8; r: 6; }
  }

  /* Modal overlay */
  #modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(5,8,20,0.85); align-items: center; justify-content: center;
  }
  #modal-overlay.show { display: flex; }
  #modal {
    background: #111828; border: 0.5px solid rgba(255,200,150,0.25);
    border-radius: 16px; width: 480px; max-width: 95vw; max-height: 85vh;
    overflow-y: auto; padding: 28px;
  }
  #modal h2 { font-size: 20px; font-weight: 400; color: #f0c88a; margin-bottom: 20px; letter-spacing: 1px; }

  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; color: rgba(240,200,138,0.7); letter-spacing: 1px; margin-bottom: 6px; }
  .form-group input, .form-group textarea {
    width: 100%; background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,200,150,0.2);
    border-radius: 8px; padding: 10px 12px; color: #e8ddd0; font-size: 14px; font-family: inherit;
    outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: rgba(255,200,150,0.6); }
  .form-group textarea { resize: vertical; min-height: 80px; }

  .photo-upload {
    border: 1.5px dashed rgba(255,200,150,0.25); border-radius: 10px;
    padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s;
    background: rgba(255,200,138,0.03);
  }
  .photo-upload:hover { border-color: rgba(255,200,150,0.5); background: rgba(255,200,138,0.07); }
  .photo-upload input { display: none; }
  .photo-upload .icon { font-size: 24px; margin-bottom: 8px; }
  .photo-upload p { font-size: 13px; color: rgba(240,200,138,0.6); }

  #photo-preview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
  .photo-thumb { aspect-ratio: 1; border-radius: 8px; overflow: hidden; position: relative; }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .photo-thumb .remove {
    position: absolute; top: 4px; right: 4px; width: 20px; height: 20px;
    background: rgba(0,0,0,0.6); border-radius: 50%; border: none;
    color: #fff; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .btn-save {
    padding: 10px 24px; background: rgba(240,200,138,0.15); border: 0.5px solid rgba(255,200,150,0.5);
    border-radius: 8px; color: #f0c88a; font-size: 14px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px;
  }
  .btn-save:hover { background: rgba(240,200,138,0.25); }
  .btn-cancel { padding: 10px 16px; background: transparent; border: none; color: rgba(240,200,138,0.5); font-size: 14px; cursor: pointer; }

  /* Story panel */
  #story-panel {
    position: fixed; right: 0; top: 0; bottom: 0; width: 340px; z-index: 50;
    background: #0e1526; border-left: 0.5px solid rgba(255,200,150,0.15);
    transform: translateX(100%); transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    overflow-y: auto; padding: 24px;
  }
  #story-panel.open { transform: translateX(0); }
  #story-panel .close-btn {
    position: absolute; top: 16px; right: 16px; width: 30px; height: 30px;
    background: rgba(255,200,150,0.1); border: none; border-radius: 50%; color: #f0c88a;
    font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  #story-panel h3 { font-size: 22px; font-weight: 400; color: #f0c88a; margin-bottom: 4px; }
  #story-panel .date { font-size: 12px; color: rgba(240,200,138,0.5); margin-bottom: 16px; letter-spacing: 1px; }
  #story-panel .desc { font-size: 14px; color: #c8bfb4; line-height: 1.7; margin-bottom: 16px; }
  .story-photos { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .story-photos img { width: 100%; border-radius: 8px; aspect-ratio: 1; object-fit: cover; }
  .story-photos img:first-child:only-child { grid-column: 1/-1; aspect-ratio: 16/9; }
  .panel-actions { display: flex; gap: 8px; }
  .btn-edit-story { flex: 1; padding: 8px; background: rgba(240,200,138,0.1); border: 0.5px solid rgba(255,200,150,0.3); border-radius: 8px; color: #f0c88a; font-size: 13px; cursor: pointer; }
  .btn-del-story { padding: 8px 12px; background: rgba(200,60,60,0.1); border: 0.5px solid rgba(200,60,60,0.3); border-radius: 8px; color: #e08080; font-size: 13px; cursor: pointer; }

  /* Timeline bottom */
  #timeline {
    position: absolute; bottom: 0; left: 0; right: 0; background: rgba(10,15,30,0.92);
    border-top: 0.5px solid rgba(255,200,150,0.15); padding: 12px 20px;
    display: flex; gap: 12px; overflow-x: auto; z-index: 10;
    scrollbar-width: thin; scrollbar-color: rgba(255,200,150,0.2) transparent;
  }
  .timeline-card {
    flex: 0 0 auto; width: 100px; cursor: pointer; border-radius: 8px;
    overflow: hidden; border: 0.5px solid rgba(255,200,150,0.15); transition: all 0.2s;
    background: rgba(20,28,50,0.8);
  }
  .timeline-card:hover { border-color: rgba(255,200,150,0.5); transform: translateY(-2px); }
  .timeline-card img { width: 100%; height: 60px; object-fit: cover; display: block; }
  .timeline-card .tc-placeholder { width: 100%; height: 60px; background: rgba(255,200,138,0.07); display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .timeline-card p { font-size: 11px; color: rgba(240,200,138,0.7); padding: 5px 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Add pin mode indicator */
  #add-mode-hint {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(240,200,138,0.15); border: 0.5px solid rgba(255,200,150,0.4);
    border-radius: 20px; padding: 8px 20px; font-size: 13px; color: #f0c88a;
    display: none; z-index: 10; pointer-events: none; letter-spacing: 0.5px;
  }
  #add-mode-hint.show { display: block; }

  /* Connection lines between pins */
  .travel-path { fill: none; stroke: rgba(240,200,138,0.15); stroke-width: 1; stroke-dasharray: 4 4; pointer-events: none; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>✦ OUR WORLD</h1>
    <div class="stats" id="stats-text">0 places · 0 photos</div>
  </div>
  <div id="map-wrap">
    <svg id="map-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="toolbar">
      <button class="tool-btn" id="btn-add" title="添加地点">＋</button>
      <button class="tool-btn" id="btn-zoom-in" title="放大">＋</button>
      <button class="tool-btn" id="btn-zoom-out" title="缩小">－</button>
      <button class="tool-btn" id="btn-reset" title="重置视图">⊙</button>
    </div>
    <div id="add-mode-hint">点击地图，标记你们去过的地方</div>
    <div id="timeline"></div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2 id="modal-title">📍 添加回忆</h2>
    <div class="form-group">
      <label>地点名称</label>
      <input type="text" id="inp-name" placeholder="例：巴黎 · 埃菲尔铁塔">
    </div>
    <div class="form-group">
      <label>日期</label>
      <input type="text" id="inp-date" placeholder="例：2024年3月">
    </div>
    <div class="form-group">
      <label>故事 / 说明</label>
      <textarea id="inp-desc" placeholder="写下你们在这里的故事..."></textarea>
    </div>
    <div class="form-group">
      <label>照片</label>
      <div class="photo-upload" id="photo-drop" onclick="document.getElementById('photo-file').click()">
        <input type="file" id="photo-file" accept="image/*" multiple>
        <div class="icon">🖼</div>
        <p>点击上传照片（可多选）</p>
      </div>
      <div id="photo-preview"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel">取消</button>
      <button class="btn-save" id="btn-save-pin">保存回忆 ✦</button>
    </div>
  </div>
</div>

<!-- Story Panel -->
<div id="story-panel">
  <button class="close-btn" id="close-panel">✕</button>
  <h3 id="sp-name"></h3>
  <div class="date" id="sp-date"></div>
  <div class="story-photos" id="sp-photos"></div>
  <div class="desc" id="sp-desc"></div>
  <div class="panel-actions">
    <button class="btn-edit-story" id="btn-edit-story">编辑</button>
    <button class="btn-del-story" id="btn-del-story">删除</button>
  </div>
</div>

<script>
const MAP_W = 1010, MAP_H = 505;
let viewX=0, viewY=0, scale=1;
let isDragging=false, dragStart={x:0,y:0}, viewStart={x:0,y:0};
let addMode=false;
let pins=[]; let editingId=null; let currentPendingCoord=null;
let currentPhotos=[]; let currentPhotoDataUrls=[];
let activePin=null;

const mapWrap=document.getElementById('map-wrap');
const mapSvg=document.getElementById('map-svg');
const addModeHint=document.getElementById('add-mode-hint');
const storyPanel=document.getElementById('story-panel');
const modalOverlay=document.getElementById('modal-overlay');
const timeline=document.getElementById('timeline');

function geoToSVG(lon,lat){
  const x=(lon+180)/360*MAP_W;
  const y=(90-lat)/180*MAP_H;
  return {x,y};
}

function updateSVGTransform(){
  mapSvg.style.transform=`translate(${viewX}px,${viewY}px) scale(${scale})`;
  mapSvg.style.transformOrigin='0 0';
}

function fitMap(){
  const w=mapWrap.clientWidth, h=mapWrap.clientHeight;
  const sx=w/MAP_W, sy=h/MAP_H;
  scale=Math.min(sx,sy);
  viewX=(w-MAP_W*scale)/2;
  viewY=(h-MAP_H*scale)/2;
  updateSVGTransform();
}

async function loadMap(){
  const resp=await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
  const world=await resp.json();
  const topo=world;
  const geometries=topo.objects.countries.geometries;

  const arcs=topo.arcs;
  function decodeArc(arcIdx){
    let pts=[];
    if(arcIdx<0){ const a=[...arcs[~arcIdx]]; a.reverse(); arcIdx=~arcIdx; pts=a; }
    else { pts=[...arcs[arcIdx]]; }
    let x=0,y=0;
    return pts.map(([dx,dy])=>{ x+=dx; y+=dy; return [x,y]; });
  }
  function topoToPath(geo){
    const type=geo.type;
    const arcsArr=geo.arcs;
    let d='';
    const rings=type==='Polygon'?[arcsArr]:arcsArr;
    rings.forEach(poly=>{
      poly.forEach(ring=>{
        let coords=[];
        ring.forEach(arcIdx=>{
          const pts=decodeArc(arcIdx);
          coords=coords.concat(pts);
        });
        coords.forEach((pt,i)=>{
          const qx=(pt[0]/topo.transform.scale[0])+topo.transform.translate[0];
          const qy=(pt[1]/topo.transform.scale[1])+topo.transform.translate[1];
          const sx=(qx+180)/360*MAP_W;
          const sy=(90-qy)/180*MAP_H;
          d+=(i===0?'M':'L')+sx.toFixed(1)+' '+sy.toFixed(1);
        });
        d+='Z';
      });
    });
    return d;
  }

  mapSvg.setAttribute('width',MAP_W);
  mapSvg.setAttribute('height',MAP_H);
  mapSvg.setAttribute('viewBox',`0 0 ${MAP_W} ${MAP_H}`);

  const ocean=document.createElementNS('http://www.w3.org/2000/svg','rect');
  ocean.setAttribute('width',MAP_W); ocean.setAttribute('height',MAP_H);
  ocean.setAttribute('fill','#0d1e35'); mapSvg.appendChild(ocean);

  const cg=document.createElementNS('http://www.w3.org/2000/svg','g');
  cg.id='countries';
  geometries.forEach(geo=>{
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',topoToPath(geo));
    path.setAttribute('fill','#1a2a42');
    path.setAttribute('stroke','#0d1525');
    path.setAttribute('stroke-width','0.5');
    cg.appendChild(path);
  });
  mapSvg.appendChild(cg);

  const pathGroup=document.createElementNS('http://www.w3.org/2000/svg','g');
  pathGroup.id='pin-paths'; mapSvg.appendChild(pathGroup);
  const pinGroup=document.createElementNS('http://www.w3.org/2000/svg','g');
  pinGroup.id='pin-group'; mapSvg.appendChild(pinGroup);

  fitMap();
}

function renderPins(){
  const pg=document.getElementById('pin-group');
  const ppg=document.getElementById('pin-paths');
  if(!pg||!ppg) return;
  pg.innerHTML=''; ppg.innerHTML='';

  if(pins.length>1){
    for(let i=1;i<pins.length;i++){
      const a=geoToSVG(pins[i-1].lon,pins[i-1].lat);
      const b=geoToSVG(pins[i].lon,pins[i].lat);
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',a.x); line.setAttribute('y1',a.y);
      line.setAttribute('x2',b.x); line.setAttribute('y2',b.y);
      line.setAttribute('class','travel-path');
      ppg.appendChild(line);
    }
  }

  pins.forEach(pin=>{
    const {x,y}=geoToSVG(pin.lon,pin.lat);
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','pin');
    g.setAttribute('transform',`translate(${x},${y})`);

    const pulse=document.createElementNS('http://www.w3.org/2000/svg','circle');
    pulse.setAttribute('cx',0); pulse.setAttribute('cy',0); pulse.setAttribute('r',8);
    pulse.setAttribute('fill','rgba(240,200,138,0.25)');
    pulse.setAttribute('class','pin-pulse'); g.appendChild(pulse);

    const outer=document.createElementNS('http://www.w3.org/2000/svg','circle');
    outer.setAttribute('cx',0); outer.setAttribute('cy',0); outer.setAttribute('r',7);
    outer.setAttribute('fill','rgba(240,200,138,0.2)');
    outer.setAttribute('stroke','rgba(240,200,138,0.8)');
    outer.setAttribute('stroke-width','1.5'); g.appendChild(outer);

    const inner=document.createElementNS('http://www.w3.org/2000/svg','circle');
    inner.setAttribute('cx',0); inner.setAttribute('cy',0); inner.setAttribute('r',3);
    inner.setAttribute('fill','#f0c88a'); g.appendChild(inner);

    g.addEventListener('click',(e)=>{ e.stopPropagation(); openStory(pin.id); });
    pg.appendChild(g);
  });

  updateTimeline();
  updateStats();
}

function updateTimeline(){
  timeline.innerHTML='';
  pins.forEach(pin=>{
    const card=document.createElement('div');
    card.className='timeline-card';
    if(pin.photos&&pin.photos.length>0){
      const img=document.createElement('img');
      img.src=pin.photos[0]; card.appendChild(img);
    } else {
      const ph=document.createElement('div');
      ph.className='tc-placeholder'; ph.textContent='📍'; card.appendChild(ph);
    }
    const p=document.createElement('p');
    p.textContent=pin.name||'未命名'; card.appendChild(p);
    card.addEventListener('click',()=>openStory(pin.id));
    timeline.appendChild(card);
  });
}

function updateStats(){
  const totalPhotos=pins.reduce((s,p)=>s+(p.photos?p.photos.length:0),0);
  document.getElementById('stats-text').textContent=`${pins.length} 个地方 · ${totalPhotos} 张照片`;
}

function openStory(id){
  const pin=pins.find(p=>p.id===id);
  if(!pin) return;
  activePin=id;
  document.getElementById('sp-name').textContent=pin.name||'未命名地点';
  document.getElementById('sp-date').textContent=pin.date||'';
  document.getElementById('sp-desc').textContent=pin.desc||'还没有写故事...';
  const ph=document.getElementById('sp-photos');
  ph.innerHTML='';
  (pin.photos||[]).forEach(src=>{
    const img=document.createElement('img'); img.src=src; ph.appendChild(img);
  });
  storyPanel.classList.add('open');
}

function closePanel(){ storyPanel.classList.remove('open'); activePin=null; }

function openModal(coord,pinId){
  editingId=pinId||null;
  currentPendingCoord=coord||null;
  currentPhotos=[]; currentPhotoDataUrls=[];

  document.getElementById('modal-title').textContent=editingId?'✏️ 编辑回忆':'📍 添加回忆';
  document.getElementById('photo-preview').innerHTML='';

  if(editingId){
    const pin=pins.find(p=>p.id===editingId);
    document.getElementById('inp-name').value=pin.name||'';
    document.getElementById('inp-date').value=pin.date||'';
    document.getElementById('inp-desc').value=pin.desc||'';
    currentPhotoDataUrls=[...(pin.photos||[])];
    renderPhotoPreview();
  } else {
    document.getElementById('inp-name').value='';
    document.getElementById('inp-date').value='';
    document.getElementById('inp-desc').value='';
  }
  modalOverlay.classList.add('show');
}

function renderPhotoPreview(){
  const preview=document.getElementById('photo-preview');
  preview.innerHTML='';
  currentPhotoDataUrls.forEach((src,i)=>{
    const thumb=document.createElement('div'); thumb.className='photo-thumb';
    const img=document.createElement('img'); img.src=src; thumb.appendChild(img);
    const rm=document.createElement('button'); rm.className='remove'; rm.textContent='✕';
    rm.onclick=()=>{ currentPhotoDataUrls.splice(i,1); renderPhotoPreview(); };
    thumb.appendChild(rm); preview.appendChild(thumb);
  });
}

document.getElementById('photo-file').addEventListener('change',function(){
  const files=Array.from(this.files);
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=(e)=>{ currentPhotoDataUrls.push(e.target.result); renderPhotoPreview(); };
    reader.readAsDataURL(file);
  });
  this.value='';
});

document.getElementById('btn-save-pin').addEventListener('click',()=>{
  const name=document.getElementById('inp-name').value.trim()||'未命名地点';
  const date=document.getElementById('inp-date').value.trim();
  const desc=document.getElementById('inp-desc').value.trim();

  if(editingId){
    const pin=pins.find(p=>p.id===editingId);
    pin.name=name; pin.date=date; pin.desc=desc; pin.photos=[...currentPhotoDataUrls];
  } else {
    if(!currentPendingCoord) return;
    pins.push({ id:Date.now().toString(), lon:currentPendingCoord.lon, lat:currentPendingCoord.lat, name, date, desc, photos:[...currentPhotoDataUrls] });
  }
  modalOverlay.classList.remove('show');
  renderPins();
});

document.getElementById('btn-cancel').addEventListener('click',()=>{ modalOverlay.classList.remove('show'); });
document.getElementById('close-panel').addEventListener('click',closePanel);

document.getElementById('btn-edit-story').addEventListener('click',()=>{
  if(!activePin) return;
  closePanel();
  openModal(null,activePin);
});

document.getElementById('btn-del-story').addEventListener('click',()=>{
  if(!activePin) return;
  pins=pins.filter(p=>p.id!==activePin);
  closePanel(); renderPins();
});

document.getElementById('btn-add').addEventListener('click',()=>{
  addMode=!addMode;
  document.getElementById('btn-add').style.background=addMode?'rgba(240,200,138,0.3)':'';
  addModeHint.classList.toggle('show',addMode);
  mapWrap.style.cursor=addMode?'crosshair':'grab';
});

document.getElementById('btn-zoom-in').addEventListener('click',()=>{ scale=Math.min(scale*1.3,8); updateSVGTransform(); });
document.getElementById('btn-zoom-out').addEventListener('click',()=>{ scale=Math.max(scale/1.3,0.3); updateSVGTransform(); });
document.getElementById('btn-reset').addEventListener('click',fitMap);

mapWrap.addEventListener('mousedown',(e)=>{
  if(e.target.closest('.pin')) return;
  if(addMode) return;
  isDragging=true;
  dragStart={x:e.clientX,y:e.clientY};
  viewStart={x:viewX,y:viewY};
  mapWrap.classList.add('grabbing');
});
window.addEventListener('mousemove',(e)=>{
  if(!isDragging) return;
  viewX=viewStart.x+(e.clientX-dragStart.x);
  viewY=viewStart.y+(e.clientY-dragStart.y);
  updateSVGTransform();
});
window.addEventListener('mouseup',()=>{ isDragging=false; mapWrap.classList.remove('grabbing'); });

mapWrap.addEventListener('wheel',(e)=>{
  e.preventDefault();
  const rect=mapWrap.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const factor=e.deltaY<0?1.1:0.9;
  const newScale=Math.max(0.3,Math.min(8,scale*factor));
  viewX=mx-(mx-viewX)*(newScale/scale);
  viewY=my-(my-viewY)*(newScale/scale);
  scale=newScale;
  updateSVGTransform();
},{ passive:false });

mapSvg.addEventListener('click',(e)=>{
  if(!addMode) return;
  const rect=mapWrap.getBoundingClientRect();
  const mx=(e.clientX-rect.left-viewX)/scale;
  const my=(e.clientY-rect.top-viewY)/scale;
  const lon=(mx/MAP_W)*360-180;
  const lat=90-(my/MAP_H)*180;
  addMode=false;
  document.getElementById('btn-add').style.background='';
  addModeHint.classList.remove('show');
  mapWrap.style.cursor='grab';
  openModal({lon,lat},null);
});

loadMap();
</script>
</body>
</html>
